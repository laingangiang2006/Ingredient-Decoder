<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ingredient Decoder</title>
    <script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        :root {
            --bg-primary: #FDFAF6;
            --color-primary: #C8A882;
            --color-safe: #6BAF8A;
            --color-warning: #E8A838;
            --color-danger: #D95F5F;
            --text-primary: #2D2D2D;
            --text-secondary: #6B6B6B;
            --card-bg: #FFFFFF;
            --border-color: #EDE8E0;
        }
        
        body {
            background-color: var(--bg-primary);
            color: var(--text-primary);
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen, Ubuntu, Cantarell, sans-serif;
        }
        
        .btn-primary {
            background-color: var(--color-primary);
            color: white;
            padding: 0.75rem 1.5rem;
            border-radius: 0.5rem;
            border: none;
            cursor: pointer;
            font-weight: 600;
            transition: opacity 0.2s;
        }
        
        .btn-primary:hover {
            opacity: 0.9;
        }
        
        .badge-safe {
            background-color: var(--color-safe);
            color: white;
            padding: 0.25rem 0.75rem;
            border-radius: 9999px;
            font-size: 0.875rem;
            font-weight: 600;
        }
        
        .badge-warning {
            background-color: var(--color-warning);
            color: white;
            padding: 0.25rem 0.75rem;
            border-radius: 9999px;
            font-size: 0.875rem;
            font-weight: 600;
        }
        
        .badge-danger {
            background-color: var(--color-danger);
            color: white;
            padding: 0.25rem 0.75rem;
            border-radius: 9999px;
            font-size: 0.875rem;
            font-weight: 600;
        }
    </style>
</head>
<body>
    <div id="root"></div>
    
    <script type="text/babel">
        const { useState, useEffect } = React;
        
        function App() {
            const [page, setPage] = useState('home');
            const [userProfile, setUserProfile] = useState(() => {
                try {
                    const saved = localStorage.getItem('userProfile');
                    return saved ? JSON.parse(saved) : { skinType: '', concerns: [] };
                } catch {
                    return { skinType: '', concerns: [] };
                }
            });
            const [savedProducts, setSavedProducts] = useState(() => {
                try {
                    const saved = localStorage.getItem('savedProducts');
                    return saved ? JSON.parse(saved) : [];
                } catch {
                    return [];
                }
            });
            const [currentProduct, setCurrentProduct] = useState(null);
            const [ingredientList, setIngredientList] = useState('');
            const [productName, setProductName] = useState('');
            const [isAnalyzing, setIsAnalyzing] = useState(false);
            const [error, setError] = useState('');
            
            useEffect(() => {
                try {
                    localStorage.setItem('userProfile', JSON.stringify(userProfile));
                } catch (e) {
                    console.warn('Failed to save userProfile:', e);
                }
            }, [userProfile]);
            
            useEffect(() => {
                try {
                    localStorage.setItem('savedProducts', JSON.stringify(savedProducts));
                } catch (e) {
                    console.warn('Failed to save savedProducts:', e);
                }
            }, [savedProducts]);
            
            const skinTypes = ['Oily', 'Dry', 'Combination', 'Sensitive', 'Normal'];
            const concerns = ['Acne', 'Anti-aging', 'Hydration', 'Redness', 'Texture', 'Dullness'];
            
            const ingredientData = {
                'Water': { function: 'Solvent and base for formulations, helps deliver other ingredients', evidence: 'well-researched', warnings: [] },
                'Glycerin': { function: 'Humectant that attracts and retains moisture in the skin', evidence: 'well-researched', warnings: [] },
                'Niacinamide': { function: 'Vitamin B3 derivative that strengthens skin barrier and reduces inflammation', evidence: 'well-researched', warnings: [] },
                'Hyaluronic Acid': { function: 'Hydrating agent that can hold up to 1000 times its weight in water', evidence: 'well-researched', warnings: [] },
                'Salicylic Acid': { function: 'Beta hydroxy acid that exfoliates and unclogs pores', evidence: 'well-researched', warnings: ['May cause irritation or dryness'] },
                'Retinol': { function: 'Vitamin A derivative that promotes cell turnover and collagen production', evidence: 'well-researched', warnings: ['Can cause irritation, redness, and increased sun sensitivity'] },
                'Vitamin C': { function: 'Antioxidant that brightens skin and protects against environmental damage', evidence: 'well-researched', warnings: ['May cause tingling or irritation in high concentrations'] },
                'Aloe Vera': { function: 'Soothes and hydrates the skin, has anti-inflammatory properties', evidence: 'well-researched', warnings: [] },
                'Tea Tree Oil': { function: 'Antimicrobial and anti-inflammatory, effective against acne-causing bacteria', evidence: 'mixed', warnings: ['Can be irritating or cause allergic reactions'] },
                'Benzoyl Peroxide': { function: 'Antibacterial agent that kills acne-causing bacteria and reduces inflammation', evidence: 'well-researched', warnings: ['Can cause dryness, irritation, and bleaching of fabrics'] },
                'Caffeine': { function: 'Stimulates circulation and may reduce puffiness under eyes', evidence: 'mixed', warnings: [] },
                'Collagen': { function: 'Protein that provides structure to the skin, used in topical products for hydration', evidence: 'mixed', warnings: [] },
                'Peptides': { function: 'Short chains of amino acids that signal skin to produce more collagen', evidence: 'mixed', warnings: [] },
                'Squalane': { function: 'Emollient that mimics skin\'s natural oils, hydrates without greasiness', evidence: 'well-researched', warnings: [] },
                'Jojoba Oil': { function: 'Wax ester that closely resembles skin sebum, balances oil production', evidence: 'well-researched', warnings: [] },
                'Shea Butter': { function: 'Rich emollient that nourishes and protects the skin barrier', evidence: 'well-researched', warnings: [] },
                'Coconut Oil': { function: 'Emollient with antimicrobial properties, but comedogenic for some', evidence: 'mixed', warnings: ['May clog pores in acne-prone skin'] },
                'Lavender Oil': { function: 'Essential oil with calming and anti-inflammatory effects', evidence: 'mixed', warnings: ['Can cause allergic reactions'] },
                'Chamomile': { function: 'Soothes irritated skin and has anti-inflammatory properties', evidence: 'mixed', warnings: [] },
                'Green Tea': { function: 'Antioxidant-rich extract that protects against UV damage and inflammation', evidence: 'well-researched', warnings: [] }
            };
            
            const handleAnalyze = async () => {
                if (!ingredientList.trim()) return;
                
                setIsAnalyzing(true);
                setError('');
                try {
                    await new Promise(resolve => setTimeout(resolve, 1500));
                    
                    const ingredients = ingredientList.split(/\s*,\s*/).map(ing => {
                        const name = ing.trim();
                        const data = ingredientData[name] || { function: 'Unknown ingredient', evidence: 'unknown', warnings: [] };
                        return {
                            name,
                            function: data.function,
                            evidence: data.evidence,
                            warnings: data.warnings
                        };
                    });
                    
                    const mockAnalysis = {
                        name: productName.trim() || 'Unnamed Product',
                        ingredients,
                        suitabilityScore: Math.floor(Math.random() * 40 + 60),
                        conflicts: [],
                        summary: 'Product analysis complete'
                    };
                    
                    setCurrentProduct(mockAnalysis);
                    setPage('analysis');
                } catch (error) {
                    console.error('Analysis failed:', error);
                    setError('Analysis failed. Please try again.');
                } finally {
                    setIsAnalyzing(false);
                }
            };
            
            const saveProduct = () => {
                if (currentProduct) {
                    setSavedProducts([...savedProducts, { 
                        ...currentProduct, 
                        id: Date.now(),
                        timestamp: new Date().toLocaleDateString()
                    }]);
                    alert('Product saved!');
                }
            };
            
            return (
                <div style={{ backgroundColor: 'var(--bg-primary)', minHeight: '100vh' }}>
                    <header style={{ backgroundColor: 'var(--card-bg)', borderBottom: `1px solid var(--border-color)` }} className="p-6">
                        <div className="max-w-6xl mx-auto flex justify-between items-center">
                            <h1 className="text-3xl font-bold" style={{ color: 'var(--color-primary)' }}>
                                Ingredient Decoder
                            </h1>
                            <nav className="flex gap-4">
                                <button onClick={() => setPage('home')} className="text-sm font-semibold hover:underline">Home</button>
                                <button onClick={() => setPage('profile')} className="text-sm font-semibold hover:underline">Profile</button>
                                <button onClick={() => setPage('saved')} className="text-sm font-semibold hover:underline">Saved ({savedProducts.length})</button>
                            </nav>
                        </div>
                    </header>
                    
                    <main className="max-w-6xl mx-auto p-6">
                        {page === 'home' && (
                            <div className="space-y-8">
                                <div style={{ backgroundColor: 'var(--card-bg)', borderRadius: '0.75rem', borderColor: 'var(--border-color)' }} className="p-8 border">
                                    <h2 className="text-2xl font-bold mb-4">Decode Your Skincare</h2>
                                    <p style={{ color: 'var(--text-secondary)' }} className="mb-6">
                                        Paste any skincare product's ingredient list and get instant, plain-English insights about what each ingredient does, potential irritants, and how it suits your skin.
                                    </p>
                                    
                                    <div className="space-y-4">
                                        <label className="block">
                                            <span className="font-semibold mb-2 block">Product Name (optional)</span>
                                            <input
                                                value={productName}
                                                onChange={(e) => setProductName(e.target.value)}
                                                placeholder="Enter product name..."
                                                className="w-full p-4 border rounded-lg text-sm"
                                                style={{ borderColor: 'var(--border-color)' }}
                                            />
                                        </label>
                                        
                                        <label className="block">
                                            <span className="font-semibold mb-2 block">Product Ingredient List (INCI format)</span>
                                            <textarea
                                                value={ingredientList}
                                                onChange={(e) => setIngredientList(e.target.value)}
                                                placeholder="Paste ingredients here, separated by commas. Example: Water, Glycerin, Niacinamide, Hyaluronic Acid..."
                                                className="w-full p-4 border rounded-lg font-mono text-sm"
                                                style={{ borderColor: 'var(--border-color)' }}
                                                rows="6"
                                            />
                                        </label>
                                        
                                        {error && <p className="text-red-500">{error}</p>}
                                        
                                        <button
                                            onClick={handleAnalyze}
                                            disabled={isAnalyzing || !ingredientList.trim()}
                                            className="btn-primary w-full py-3 text-lg font-bold"
                                        >
                                            {isAnalyzing ? (
                                                <span>Analyzing... <div className="inline-block animate-spin rounded-full h-4 w-4 border-b-2 border-white ml-2"></div></span>
                                            ) : (
                                                '🔍 Analyze Ingredients'
                                            )}
                                        </button>
                                    </div>
                                </div>
                                
                                <div className="grid md:grid-cols-3 gap-6">
                                    <div style={{ backgroundColor: 'var(--card-bg)', borderColor: 'var(--border-color)' }} className="p-6 rounded-lg border">
                                        <h3 className="font-bold mb-2">⚡ Instant Clarity</h3>
                                        <p style={{ color: 'var(--text-secondary)' }} className="text-sm">Get plain-English explanations instead of Latin scientific names.</p>
                                    </div>
                                    <div style={{ backgroundColor: 'var(--card-bg)', borderColor: 'var(--border-color)' }} className="p-6 rounded-lg border">
                                        <h3 className="font-bold mb-2">🚩 Smart Alerts</h3>
                                        <p style={{ color: 'var(--text-secondary)' }} className="text-sm">Identify irritants, allergens, and ingredient conflicts instantly.</p>
                                    </div>
                                    <div style={{ backgroundColor: 'var(--card-bg)', borderColor: 'var(--border-color)' }} className="p-6 rounded-lg border">
                                        <h3 className="font-bold mb-2">👤 Personalized</h3>
                                        <p style={{ color: 'var(--text-secondary)' }} className="text-sm">Recommendations tailored to your skin type and specific concerns.</p>
                                    </div>
                                </div>
                            </div>
                        )}
                        
                        {page === 'profile' && (
                            <div style={{ backgroundColor: 'var(--card-bg)', borderRadius: '0.75rem', borderColor: 'var(--border-color)' }} className="p-8 border">
                                <h2 className="text-2xl font-bold mb-6">Your Skin Profile</h2>
                                
                                <div className="space-y-6">
                                    <div>
                                        <label className="block font-semibold mb-3">Skin Type</label>
                                        <div className="flex flex-wrap gap-3">
                                            {skinTypes.map(type => (
                                                <button
                                                    key={type}
                                                    onClick={() => setUserProfile({ ...userProfile, skinType: type })}
                                                    style={{
                                                        backgroundColor: userProfile.skinType === type ? 'var(--color-primary)' : 'var(--border-color)',
                                                        color: userProfile.skinType === type ? 'white' : 'var(--text-primary)'
                                                    }}
                                                    className="px-4 py-2 rounded-lg font-semibold transition"
                                                >
                                                    {type}
                                                </button>
                                            ))}
                                        </div>
                                    </div>
                                    
                                    <div>
                                        <label className="block font-semibold mb-3">Skin Concerns (select all that apply)</label>
                                        <div className="flex flex-wrap gap-3">
                                            {concerns.map(concern => (
                                                <button
                                                    key={concern}
                                                    onClick={() => {
                                                        const updated = userProfile.concerns.includes(concern)
                                                            ? userProfile.concerns.filter(c => c !== concern)
                                                            : [...userProfile.concerns, concern];
                                                        setUserProfile({ ...userProfile, concerns: updated });
                                                    }}
                                                    style={{
                                                        backgroundColor: userProfile.concerns.includes(concern) ? 'var(--color-safe)' : 'var(--border-color)',
                                                        color: userProfile.concerns.includes(concern) ? 'white' : 'var(--text-primary)'
                                                    }}
                                                    className="px-4 py-2 rounded-lg font-semibold transition"
                                                >
                                                    {concern}
                                                </button>
                                            ))}
                                        </div>
                                    </div>
                                    
                                    <button onClick={() => { alert('Profile saved!'); setPage('home'); }} className="btn-primary w-full py-3">
                                        Save & Back to Home
                                    </button>
                                </div>
                            </div>
                        )}
                        
                        {page === 'analysis' && currentProduct && (
                            <div className="space-y-6">
                                <div style={{ backgroundColor: 'var(--card-bg)', borderRadius: '0.75rem', borderColor: 'var(--border-color)' }} className="p-8 border">
                                    <h3 className="text-xl font-bold mb-2">{currentProduct.name}</h3>
                                    <div className="flex justify-between items-center mb-4">
                                        <h2 className="text-2xl font-bold">Suitability Score</h2>
                                        <div style={{ 
                                            backgroundColor: currentProduct.suitabilityScore > 75 ? 'var(--color-safe)' : currentProduct.suitabilityScore > 50 ? 'var(--color-warning)' : 'var(--color-danger)',
                                            width: '80px',
                                            height: '80px'
                                        }} className="rounded-full flex items-center justify-center text-white text-2xl font-bold">
                                            {currentProduct.suitabilityScore}%
                                        </div>
                                    </div>
                                    <p style={{ color: 'var(--text-secondary)' }}>
                                        Based on your {userProfile.skinType || 'general'} skin{userProfile.skinType && ' type'} and concerns: {userProfile.concerns.join(', ') || 'None specified'}
                                    </p>
                                </div>
                                
                                <div style={{ backgroundColor: 'var(--card-bg)', borderRadius: '0.75rem', borderColor: 'var(--border-color)' }} className="p-8 border">
                                    <h3 className="text-xl font-bold mb-4">Ingredient Breakdown</h3>
                                    <div className="space-y-4">
                                        {currentProduct.ingredients.map((ing, idx) => (
                                            <div key={idx} style={{ backgroundColor: 'var(--bg-primary)', borderLeft: `4px solid var(--color-primary)` }} className="p-4 rounded">
                                                <div className="flex justify-between items-start mb-2">
                                                    <h4 className="font-bold">{ing.name}</h4>
                                                    <span className={ing.evidence === 'well-researched' ? 'badge-safe' : ing.evidence === 'mixed' ? 'badge-warning' : 'badge-danger'}>
                                                        {ing.evidence}
                                                    </span>
                                                </div>
                                                <p style={{ color: 'var(--text-secondary)' }} className="text-sm mb-2">{ing.function}</p>
                                                {ing.warnings.length > 0 && (
                                                    <div className="flex gap-2 flex-wrap">
                                                        {ing.warnings.map((warn, i) => (
                                                            <span key={i} className="badge-warning text-xs">{warn}</span>
                                                        ))}
                                                    </div>
                                                )}
                                            </div>
                                        ))}
                                    </div>
                                </div>
                                
                                <div className="flex gap-4">
                                    <button onClick={saveProduct} className="btn-primary flex-1 py-3">
                                        💾 Save Product
                                    </button>
                                    <button onClick={() => { setPage('home'); setIngredientList(''); setProductName(''); }} className="flex-1 py-3 border-2 rounded-lg font-semibold" style={{ borderColor: 'var(--color-primary)', color: 'var(--color-primary)' }}>
                                        ← Analyze Another
                                    </button>
                                </div>
                            </div>
                        )}
                        
                        {page === 'saved' && (
                            <div>
                                <h2 className="text-2xl font-bold mb-6">Saved Products</h2>
                                {savedProducts.length === 0 ? (
                                    <div style={{ backgroundColor: 'var(--card-bg)', borderRadius: '0.75rem', borderColor: 'var(--border-color)' }} className="p-8 text-center border">
                                        <p style={{ color: 'var(--text-secondary)' }} className="mb-4">No saved products yet.</p>
                                        <button onClick={() => setPage('home')} className="btn-primary">
                                            Analyze Your First Product
                                        </button>
                                    </div>
                                ) : (
                                    <div className="grid md:grid-cols-2 gap-6">
                                        {savedProducts.map(product => (
                                            <div key={product.id} style={{ backgroundColor: 'var(--card-bg)', borderRadius: '0.75rem', borderColor: 'var(--border-color)' }} className="p-6 border">
                                                <div className="flex justify-between items-start mb-4">
                                                    <div>
                                                        <h4 className="font-bold">{product.name}</h4>
                                                        <p className="text-sm" style={{ color: 'var(--text-secondary)' }}>{product.timestamp}</p>
                                                        <p className="font-semibold">Score: {product.suitabilityScore}%</p>
                                                    </div>
                                                    <div style={{ 
                                                        backgroundColor: product.suitabilityScore > 75 ? 'var(--color-safe)' : product.suitabilityScore > 50 ? 'var(--color-warning)' : 'var(--color-danger)',
                                                        width: '50px',
                                                        height: '50px'
                                                    }} className="rounded-full flex items-center justify-center text-white font-bold">
                                                        {product.suitabilityScore}%
                                                    </div>
                                                </div>
                                                <p className="text-sm" style={{ color: 'var(--text-secondary)' }}>
                                                    {product.ingredients.length} ingredients
                                                </p>
                                            </div>
                                        ))}
                                    </div>
                                )}
                            </div>
                        )}
                    </main>
                </div>
            );
        }
        
        ReactDOM.render(<App />, document.getElementById('root'));
    </script>
</body>
</html>
